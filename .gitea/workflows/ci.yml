name: CI

# Keep validation steps local to this job. On current Gitea, a cross-repository
# reusable-workflow reference can be recorded as successful without executing
# its steps. This job therefore fetches molecule-ci's canonical scripts over
# HTTPS and runs them directly. The `GITHUB_*` names below are Gitea Actions
# compatibility variables; canonical SCM remains git.moleculesai.app.
#
# Canonical validator source:
# molecule-ai/molecule-ci/.gitea/workflows/validate-org-template.yml

on: [push, pull_request]

env:
  # Pin the Gitea Actions compatibility variable to canonical SCM.
  GITHUB_SERVER_URL: https://git.moleculesai.app

permissions:
  contents: read

jobs:
  org-template-validation:
    name: Org template validation
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Reject retired operational guidance
        run: python3 scripts/check_current_state_guidance.py
      - name: Test current-state and non-disclosing scanners
        run: python3 -m unittest scripts/test_current_state_guidance.py scripts/test_check_no_secrets.py
      - name: Check for secrets without logging matched values
        run: python3 scripts/check_no_secrets.py
      # Canonical validator script lives in molecule-ci, fetched fresh
      # on every run. Anonymous fetch of the public molecule-ci repo —
      # no token needed; no actions/checkout cross-repo idiosyncrasies.
      - name: Fetch molecule-ci canonical scripts
        run: git clone --depth 1 https://git.moleculesai.app/molecule-ai/molecule-ci.git .molecule-ci-canonical
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: .molecule-ci-canonical/.molecule-ci/scripts/requirements.txt
      - run: pip install pyyaml jsonschema -q
      - name: Test and enforce native-channel allowlists
        run: |
          python3 -m unittest scripts/test_channel_allowlists.py
          python3 scripts/check_channel_allowlists.py
      - name: Validate template shape
        run: |
          python3 .molecule-ci/scripts/validate-org-template.py
          python3 .molecule-ci-canonical/.molecule-ci/scripts/validate-org-template.py

  validate:
    name: validate
    runs-on: ubuntu-latest
    needs: org-template-validation
    steps:
      - name: Assert required checks passed
        run: |
          result="${{ needs.org-template-validation.result }}"
          echo "org-template-validation: $result"
          if [ "$result" != "success" ]; then
            echo "::error::Org template validation did not succeed: $result"
            exit 1
          fi
